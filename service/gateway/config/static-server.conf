# gateway-server config
# Format: key=value

server.host=0.0.0.0
server.port=80

static.frontend_root=/app/frontend

log.dir=/app/logs
log.file=gateway-server.log

proxy.enabled=true
# Multi-route format (repeatable):
# proxy.route=<route_prefix>,<upstream_host>,<upstream_port>,<mode>[,preserve_path]
# mode: http | raw; preserve_path: true|false (default false)
proxy.route=/api/v1/auth,127.0.0.1,8081,http
proxy.route=/api/v1/admin,127.0.0.1,8010,http,true
proxy.route=/api,127.0.0.1,8080,http
proxy.route=/ai,127.0.0.1,8000,raw

# Indexed format is also supported:
# proxy.route.1.prefix=/api
# proxy.route.1.upstream_host=business
# proxy.route.1.upstream_port=8080
# proxy.route.1.mode=http
